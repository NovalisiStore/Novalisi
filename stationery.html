  <script>
    // Stationery page init — runs instead of the main site init
    (function () {
      // Translate stationery-specific elements not covered by applyLang
      function translatePage() {
        document.getElementById("stat-heading").textContent = t("statPageTitle");
        document.getElementById("stat-search-input").placeholder = t("statSearchPh");
        document.getElementById("btn-stat-modal-close").textContent = t("close");
        document.getElementById("btn-stat-modal-order").textContent = t("statOrder");
        document.getElementById("nav-home").textContent = t("navHome");
        document.getElementById("nav-catalog").textContent = t("navCat");
        document.getElementById("nav-stat").textContent = t("navStat");
        document.getElementById("nav-contact").textContent = t("navContact");
        document.getElementById("f-home").textContent = t("navHome");
        document.getElementById("f-catalog").textContent = t("navCat");
        document.getElementById("f-stat").textContent = t("navStat");
        document.getElementById("f-contact").textContent = t("navContact");
        const _fc = document.getElementById("footer-copy");
        if (_fc) { _fc.innerHTML = t("footer", STORE.year, STORE.city[currentLang]); attachVakhoTooltip(); }
      }

      // Extend setLang to also re-translate stationery-specific elements
      const _baseLang = window.setLang;
      window.setLang = function (lang, btn) {
        _baseLang(lang, btn);
        translatePage();
        if (allItems.length) { buildStatTypeTabs(); buildStatCatChips(); renderStat(); }
      };

      // Override orderCurrentItem to pass message via localStorage then navigate
      window.orderCurrentItem = function () {
        if (!currentItem) return;
        closeStatModal();
        const msg = TX.ka.statOrderMsg(sName(currentItem));
        localStorage.setItem("novalisi_order_msg", msg);
        window.location.href = "index.html";
      };

      translatePage();
      loadStationery();
    })();
  </script>
